</div>
<p class="text-on-surface-variant text-lg font-medium tracking-tight">Tailor your resume for every job, in seconds.</p>
</div>

<button class="w-full bg-white text-[#000000] font-bold py-3 px-4 rounded-lg flex items-center justify-center gap-3 hover:bg-gray-100 transition-all active:scale-[0.98]">

<div class="space-y-1.5">

</div>
<div class="space-y-1.5">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-tighter">Password</label>

</div>

                </button>

<p class="text-on-surface-variant text-sm">

<div class="text-[10px] font-mono text-primary leading-tight text-right">
